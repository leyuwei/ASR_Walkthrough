<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>&#28120;&#27668;&#20845;&#23453;&#36208;&#26597;</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <section id="authGate" class="auth-gate" aria-live="polite">
    <div class="auth-card">
      <h2>&#20351;&#29992;&#25480;&#26435;</h2>
      <p>&#35831;&#36755;&#20837;&#25480;&#26435;&#30721;&#21518;&#32487;&#32493;&#12290;</p>
      <form id="authForm" autocomplete="off">
        <label class="sr-only" for="authCodeInput">&#25480;&#26435;&#30721;</label>
        <input id="authCodeInput" class="auth-input" type="password" name="code" placeholder="&#35831;&#36755;&#20837;&#25480;&#26435;&#30721;" required>
        <button id="authSubmitBtn" class="btn primary auth-submit" type="submit">&#39564;&#35777;&#24182;&#36827;&#20837;</button>
      </form>
      <div id="authMessage" class="auth-message" role="status"></div>
    </div>
  </section>

  <main id="mainApp" class="app app-locked" hidden>
    <section class="panel">
      <header class="header">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="30" fill="rgba(255,255,255,0.2)"/>
            <circle cx="20" cy="20" r="5.2" fill="#fff"/>
            <circle cx="32" cy="16.5" r="5.2" fill="#fff"/>
            <circle cx="44" cy="20" r="5.2" fill="#fff"/>
            <path d="M20 37.5C20 30.6 44 30.6 44 37.5C44 43.8 39.2 49 32 49C24.8 49 20 43.8 20 37.5Z" fill="#fff"/>
          </svg>
        </div>
        <h1>&#28120;&#27668;&#20845;&#23453;&#36208;&#26597;</h1>
        <p class="sub">
          &#25353;&#20303;&#24405;&#38899;&#65292;&#26494;&#24320;&#32467;&#26463;&#12290;&#31995;&#32479;&#33258;&#21160;&#25191;&#34892;&#65306;&#26102;&#38388;&#22320;&#28857;&#35760;&#24405; &#8594; ASR &#8594; AI &#20998;&#26512;&#12290;
        </p>
      </header>

      <div class="center">
        <div class="record-wrap">
          <button id="recordBtn" class="record-btn" type="button">
            &#25353;&#20303;&#24405;&#38899;
          </button>
          <div class="hint" id="recordHint">&#26494;&#25163;&#21363;&#20026;&#20572;&#27490;&#65292;&#22914;&#26080;&#21709;&#24212;&#65292;&#21487;&#20877;&#36731;&#28857;&#19968;&#19979;&#20197;&#20572;&#27490;&#24405;&#21046;&#12290;</div>
        </div>
      </div>

      <div id="status" class="status">
        &#23601;&#32490;&#12290;
      </div>

      <div class="toolbar">
        <button id="logoutBtn" class="btn ghost" type="button">&#36864;&#20986;&#25480;&#26435;</button>
        <button id="exportBtn" class="btn ghost" type="button">&#23548;&#20986; TXT</button>
        <button id="clearBtn" class="btn warn" type="button">&#19968;&#38190;&#28165;&#31354;</button>
      </div>

      <ul id="recordList" class="list"></ul>
      <div id="emptyView" class="empty">
        &#26242;&#26080;&#35760;&#24405;&#12290;&#25353;&#20303;&#20013;&#38388;&#24405;&#38899;&#38190;&#24320;&#22987;&#12290;
      </div>
    </section>
  </main>

  <div id="exportModal" class="modal-backdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="exportDialogTitle">
      <h3 id="exportDialogTitle">&#23548;&#20986;&#37197;&#32622;</h3>
      <form id="exportForm" class="modal-form">
        <label for="exportWeather">&#24403;&#22825;&#22825;&#27668;</label>
        <select id="exportWeather" name="weather" required>
          <option value="&#26228;&#22825;">&#26228;&#22825;</option>
          <option value="&#38452;&#22825;">&#38452;&#22825;</option>
          <option value="&#22810;&#20113;">&#22810;&#20113;</option>
          <option value="&#23567;&#38632;">&#23567;&#38632;</option>
          <option value="&#20013;&#38632;">&#20013;&#38632;</option>
          <option value="&#22823;&#38632;">&#22823;&#38632;</option>
          <option value="&#26292;&#38632;">&#26292;&#38632;</option>
          <option value="&#38632;&#22841;&#38634;">&#38632;&#22841;&#38634;</option>
          <option value="&#23567;&#38634;">&#23567;&#38634;</option>
          <option value="&#20013;&#38634;">&#20013;&#38634;</option>
          <option value="&#22823;&#38634;">&#22823;&#38634;</option>
          <option value="&#38654;">&#38654;</option>
          <option value="&#38718;">&#38718;</option>
          <option value="&#27801;&#23576;">&#27801;&#23576;</option>
        </select>

        <label for="exportStartTime">&#35760;&#24405;&#24320;&#22987;&#26102;&#38388;</label>
        <input id="exportStartTime" name="startTime" type="time" step="60" required>

        <fieldset class="mode-fieldset">
          <legend>&#23548;&#20986;&#27169;&#24335;</legend>
          <label class="radio-line">
            <input type="radio" name="exportMode" value="ai_only" checked>
            <span>&#20165;AI&#20998;&#26512;&#35760;&#24405;&#23548;&#20986;</span>
          </label>
          <label class="radio-line">
            <input type="radio" name="exportMode" value="full">
            <span>&#20840;&#37327;&#35760;&#24405;&#23548;&#20986;&#65288;&#21547;ASR&#36716;&#20889;&#65289;</span>
          </label>
        </fieldset>

        <div class="modal-actions">
          <button id="exportCancelBtn" class="btn ghost" type="button">&#21462;&#28040;</button>
          <button id="exportConfirmBtn" class="btn primary" type="submit">&#30830;&#35748;&#23548;&#20986;</button>
        </div>
      </form>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
